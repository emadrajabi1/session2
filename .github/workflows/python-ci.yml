on: [push]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        run: git clone https://github.com/emadrajabi1/session2.git
        
      - name: install python and pip
        run: sudo apt-get update && sudo apt-get install -y python3 python3-pip

      -name: Run tests 
        run: pytest test.py

      
