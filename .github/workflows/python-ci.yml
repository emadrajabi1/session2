name: Python CI
on: [push]

jobs:
  test:
    runs-on: ubuntu-lates
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Run script
        run: python3 main.py



      
